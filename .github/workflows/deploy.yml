# Needs secrets: SSH_HOST, SSH_USER, SSH_REMOTE_PATH, SSH_PRIVATE_KEY. Optional: SSH_PORT (defaults to 22), SSH_PASSPHRASE.
# "Connection refused" on port 22 → set SSH_PORT to the port from cPanel → SSH Access (often e.g. 21098, not 22).
# If port is correct but still refused, the host may block SSH from cloud IPs; then use a self-hosted runner or non-SSH deploy.

name: Continuous Integration and Deployment

on:
  push:
    branches: "main"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@15c43e89cdef867065b0213be354c2841860869e
        with:
          php-version: "8.2"

      #   - name: Install Dependencies
      #     run: |
      #       composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      # webfactory/ssh-agent cannot unlock passphrase-protected keys in CI.
      # If your key is encrypted, add repository secret SSH_PASSPHRASE (same passphrase as locally).
      # Or use a deploy-only key with no passphrase (recommended for CI).
      - name: Start SSH agent and add deploy key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PASSPHRASE: ${{ secrets.SSH_PASSPHRASE }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/github_deploy_key
          chmod 600 ~/.ssh/github_deploy_key
          if [ -n "${SSH_PASSPHRASE:-}" ]; then
            ssh-keygen -p -P "$SSH_PASSPHRASE" -N "" -f ~/.ssh/github_deploy_key
          fi
          ssh-add ~/.ssh/github_deploy_key
          rm -f ~/.ssh/github_deploy_key

      - name: Deploy over SSH (rsync)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_REMOTE_PATH: ${{ secrets.SSH_REMOTE_PATH }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          PORT="${SSH_PORT:-22}"
          : "${SSH_HOST:?Repository secret SSH_HOST is missing or empty}"
          : "${SSH_USER:?Repository secret SSH_USER is missing or empty}"
          : "${SSH_REMOTE_PATH:?Repository secret SSH_REMOTE_PATH is missing or empty}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "Using SSH port ${PORT} (repository secret SSH_PORT; defaults to 22 if unset)."
          # No ssh-keyscan: many hosts block it; first real ssh uses StrictHostKeyChecking=accept-new.
          rsync -avz --delete \
            -e "ssh -p $PORT -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new" \
            --exclude '.git/' \
            --exclude '.github/' \
            ./ "${SSH_USER}@${SSH_HOST}:${SSH_REMOTE_PATH}"
